    function b64ToBytes(text) {
      const binary = atob(text);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(passphrase, salt) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: payload.iterations, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock() {
      const input = document.getElementById("passphrase");
      const button = document.getElementById("unlock");
      const status = document.getElementById("status");
      const passphrase = input.value;
      if (!passphrase) {
        status.textContent = "请输入口令。";
        return;
      }
      button.disabled = true;
      status.textContent = "正在解密...";
      try {
        const key = await deriveKey(passphrase, b64ToBytes(payload.salt));
        const cipherPlusTag = new Uint8Array([...b64ToBytes(payload.ciphertext), ...b64ToBytes(payload.tag)]);
        const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 }, key, cipherPlusTag);
        const html = new TextDecoder().decode(plain);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        status.textContent = "口令不正确，或文件已损坏。";
        button.disabled = false;
      }
    }

    document.getElementById("unlock").addEventListener("click", unlock);
    document.getElementById("passphrase").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
